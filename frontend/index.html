<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility Agent | Universal Voice AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Accessibility<span>Agent</span></h1>
            <p class="subtitle">Empowering Information Access for Everyone</p>
        </header>

        <main>
            <div class="agent-viz">
                <canvas id="audio-waveform"></canvas>
                <div class="core-node"></div>
                <div class="pulse-ring"></div>
            </div>

            <div class="controls-grid">
                <div class="control-item">
                    <label>High Contrast</label>
                    <button id="contrast-toggle" class="toggle-btn">Disabled</button>
                </div>
                <div class="control-item">
                    <label>Visual Aids</label>
                    <button id="visual-aids-toggle" class="toggle-btn">Enabled</button>
                </div>
                <div class="control-item">
                    <label>Text Size</label>
                    <button id="text-size-toggle" class="toggle-btn">Standard</button>
                </div>
            </div>

            <div class="status-panel">
                <div id="status-text">System Ready</div>
                <div id="sub-status">Awaiting voice command initialization</div>
            </div>

            <div class="action-area">
                <button id="call-btn" class="main-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    Initiate Voice Protocol
                </button>
            </div>

            <div class="transcript-box" id="transcript">
                <p class="placeholder-text">Live transcript will appear here...</p>
            </div>
        </main>

        <section class="impact-stats">
            <div class="stat">
                <span class="val">Global</span>
                <span class="lab">Domain Support</span>
            </div>
            <div class="stat">
                <span class="val">Vectored</span>
                <span class="lab">Knowledge Base</span>
            </div>
        </section>
    </div>

    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js"></script>
    <script src="script.js"></script>
</body>
</html>
